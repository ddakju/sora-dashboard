<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORA Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .widget {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* ── Slime Body ── */
  .slime {
    width: 160px;
    height: 160px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slime-body {
    width: 130px;
    height: 117px;
    border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
    position: relative;
    transition: background 0.4s ease;
  }

  .slime-body::after {
    content: '';
    position: absolute;
    bottom: -13px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 22px;
    border-radius: 0 0 50% 50%;
    background: inherit;
    transition: background 0.4s ease;
  }

  .slime-body::before {
    content: '';
    position: absolute;
    top: 18px;
    left: 22px;
    width: 28px;
    height: 18px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transform: rotate(-20deg);
  }

  /* ── Face ── */
  .face {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -44%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .eyes { display: flex; gap: 18px; }

  .eye {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #1a1a2e;
    position: relative;
    transition: all 0.3s ease;
  }

  .mouth {
    width: 20px;
    height: 10px;
    border-radius: 0 0 12px 12px;
    border-bottom: 3px solid #1a1a2e;
    border-left: 3px solid #1a1a2e;
    border-right: 3px solid #1a1a2e;
    transition: all 0.3s ease;
  }

  /* ── State: idle ── */
  .state-idle .slime-body { background: #4caf7d; }
  .state-idle .slime-body::after { background: #4caf7d; }
  .state-idle .eye { background: #1a3a2e; }
  .state-idle .mouth {
    width: 20px; height: 10px;
    border-radius: 0 0 12px 12px;
    border-bottom: 3px solid #1a3a2e;
    border-left: 3px solid #1a3a2e;
    border-right: 3px solid #1a3a2e;
    border-top: none;
  }
  .state-idle .slime { animation: bounce 2s ease-in-out infinite; }

  /* ── State: working (default / fallback) ── */
  .state-working .slime-body { background: #4a90d9; }
  .state-working .slime-body::after { background: #4a90d9; }
  .state-working .eye {
    background: #0d2a4a;
    width: 10px; height: 10px;
  }
  .state-working .mouth {
    width: 16px; height: 5px;
    border-radius: 2px;
    border-bottom: 3px solid #0d2a4a;
    border-left: 3px solid #0d2a4a;
    border-right: 3px solid #0d2a4a;
    border-top: none;
  }
  .state-working .slime { animation: work 0.6s ease-in-out infinite; }
  .state-working .slime-body { animation: stretch 0.6s ease-in-out infinite; }

  /* ── Substate: thinking — purple, eyes up ── */
  .sub-thinking .slime-body { background: #9b6dd7; animation: think-pulse 1.5s ease-in-out infinite; }
  .sub-thinking .slime-body::after { background: #9b6dd7; }
  .sub-thinking .eye { background: #2d1650; width: 10px; height: 8px; border-radius: 50%; }
  .sub-thinking .eyes { transform: translateY(-3px); }
  .sub-thinking .mouth {
    width: 8px; height: 8px; border-radius: 50%;
    border: 3px solid #2d1650; border-top: none; border-left: none;
  }
  .sub-thinking .slime { animation: think-bob 2s ease-in-out infinite; }
  .sub-thinking .status-label { color: #9b6dd7; }
  .sub-thinking .status-dot { background: #9b6dd7; }

  /* ── Substate: typing — blue, mouth open/close ── */
  .sub-typing .slime-body { background: #4a90d9; }
  .sub-typing .slime-body::after { background: #4a90d9; }
  .sub-typing .eye { background: #0d2a4a; width: 10px; height: 10px; }
  .sub-typing .mouth {
    width: 12px; height: 8px; border-radius: 50%;
    border: 3px solid #0d2a4a;
    animation: talk 0.4s ease-in-out infinite;
  }
  .sub-typing .slime { animation: work 0.6s ease-in-out infinite; }
  .sub-typing .slime-body { animation: stretch 0.6s ease-in-out infinite; }

  /* ── Substate: searching — yellow, eyes scanning ── */
  .sub-searching .slime-body { background: #e0a830; animation: none; }
  .sub-searching .slime-body::after { background: #e0a830; }
  .sub-searching .eye { background: #4a3600; width: 11px; height: 11px; }
  .sub-searching .eyes { animation: scan-eyes 1.2s ease-in-out infinite; }
  .sub-searching .mouth {
    width: 14px; height: 5px; border-radius: 2px;
    border-bottom: 3px solid #4a3600; border-left: 3px solid #4a3600;
    border-right: 3px solid #4a3600; border-top: none;
  }
  .sub-searching .slime { animation: search-bounce 0.8s ease-in-out infinite; }
  .sub-searching .status-label { color: #e0a830; }
  .sub-searching .status-dot { background: #e0a830; }

  /* ── Substate: coding — mint, focused squint ── */
  .sub-coding .slime-body { background: #2dd4bf; animation: none; }
  .sub-coding .slime-body::after { background: #2dd4bf; }
  .sub-coding .eye { background: #0a3a36; width: 12px; height: 6px; border-radius: 6px 6px 2px 2px; }
  .sub-coding .mouth {
    width: 16px; height: 3px; border-radius: 2px;
    border-bottom: 3px solid #0a3a36; border-left: none;
    border-right: none; border-top: none;
  }
  .sub-coding .slime { animation: code-type 0.3s steps(2) infinite; }
  .sub-coding .slime-body { animation: stretch 0.8s ease-in-out infinite; }
  .sub-coding .status-label { color: #2dd4bf; }
  .sub-coding .status-dot { background: #2dd4bf; }

  /* ── Substate: reading — sky blue, big eyes ── */
  .sub-reading .slime-body { background: #5bc0de; animation: none; }
  .sub-reading .slime-body::after { background: #5bc0de; }
  .sub-reading .eye { background: #0a3040; width: 14px; height: 14px; border-radius: 50%; }
  .sub-reading .mouth {
    width: 14px; height: 5px; border-radius: 2px;
    border-bottom: 3px solid #0a3040; border-left: 3px solid #0a3040;
    border-right: 3px solid #0a3040; border-top: none;
  }
  .sub-reading .slime { animation: read-nod 1.5s ease-in-out infinite; }
  .sub-reading .status-label { color: #5bc0de; }
  .sub-reading .status-dot { background: #5bc0de; }

  /* ── Substate: restarting — orange, spinning ── */
  .sub-restarting .slime-body { background: #e07b30; animation: none; }
  .sub-restarting .slime-body::after { background: #e07b30; }
  .sub-restarting .eye { background: #4a2800; width: 10px; height: 10px; }
  .sub-restarting .mouth {
    width: 12px; height: 12px; border-radius: 50%;
    border: 3px solid #4a2800;
  }
  .sub-restarting .slime { animation: spin-restart 1s linear infinite; }
  .sub-restarting .status-label { color: #e07b30; }
  .sub-restarting .status-dot { background: #e07b30; }

  /* ── State: error ── */
  .state-error .slime-body { background: #e05555; }
  .state-error .slime-body::after { background: #e05555; }
  .state-error .eye {
    background: #3a0d0d;
    border-radius: 50%;
    width: 13px; height: 13px;
  }
  .state-error .eye::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 2px solid #3a0d0d;
    background: #e05555;
  }
  .state-error .mouth {
    width: 18px; height: 7px;
    border-radius: 12px 12px 0 0;
    border-top: 3px solid #3a0d0d;
    border-left: 3px solid #3a0d0d;
    border-right: 3px solid #3a0d0d;
    border-bottom: none;
  }
  .state-error .slime { animation: shake 0.3s ease-in-out infinite; }

  /* ── State: sleeping ── */
  .state-sleeping .slime-body { background: #888; }
  .state-sleeping .slime-body::after { background: #888; }
  .state-sleeping .eye {
    background: transparent;
    width: 14px; height: 4px;
    border-radius: 0;
    border-bottom: 3px solid #333;
    border-top: none;
  }
  .state-sleeping .mouth {
    width: 14px; height: 5px;
    border-radius: 2px;
    border-bottom: 3px solid #333;
    border-left: 3px solid #333;
    border-right: 3px solid #333;
    border-top: none;
  }
  .state-sleeping .slime { animation: breathe 3s ease-in-out infinite; }

  /* ── Animations ── */
  @keyframes bounce {
    0%, 100% { transform: translateY(0) scaleY(1) scaleX(1); }
    40%       { transform: translateY(-16px) scaleY(1.06) scaleX(0.96); }
    60%       { transform: translateY(-14px) scaleY(1.06) scaleX(0.96); }
    80%       { transform: translateY(2px) scaleY(0.93) scaleX(1.07); }
  }

  @keyframes work {
    0%, 100% { transform: translateY(0); }
    25%       { transform: translateY(-8px); }
    75%       { transform: translateY(2px); }
  }

  @keyframes stretch {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    25%       { transform: scaleX(0.88) scaleY(1.12); }
    75%       { transform: scaleX(1.08) scaleY(0.94); }
  }

  @keyframes shake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-5px) rotate(-2deg); }
    40%  { transform: translateX(5px) rotate(2deg); }
    60%  { transform: translateX(-4px) rotate(-1deg); }
    80%  { transform: translateX(4px) rotate(1deg); }
    100% { transform: translateX(0); }
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.07); }
  }

  /* ── Substate animations ── */
  @keyframes think-bob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  @keyframes think-pulse {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    50%       { transform: scaleX(1.03) scaleY(0.97); }
  }

  @keyframes talk {
    0%, 100% { transform: scaleY(1); }
    50%       { transform: scaleY(0.4); }
  }

  @keyframes scan-eyes {
    0%, 100% { transform: translateX(0); }
    25%       { transform: translateX(5px); }
    75%       { transform: translateX(-5px); }
  }

  @keyframes search-bounce {
    0%, 100% { transform: translateY(0) rotate(0); }
    25%       { transform: translateY(-5px) rotate(3deg); }
    75%       { transform: translateY(-5px) rotate(-3deg); }
  }

  @keyframes code-type {
    0%  { transform: translateY(0); }
    50% { transform: translateY(-2px); }
  }

  @keyframes read-nod {
    0%, 100% { transform: translateY(0) rotate(0); }
    30%       { transform: translateY(-3px) rotate(2deg); }
    60%       { transform: translateY(-3px) rotate(-2deg); }
  }

  @keyframes spin-restart {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ── ZZZ ── */
  .zzz {
    position: absolute;
    top: -10px;
    right: -5px;
    font-size: 16px;
    color: #aaa;
    font-weight: bold;
    opacity: 0;
    animation: none;
  }

  .state-sleeping .zzz { animation: floatZ 2.4s ease-in-out infinite; }
  .state-sleeping .zzz:nth-child(2) { animation-delay: 0.8s; font-size: 12px; right: -14px; top: -20px; }
  .state-sleeping .zzz:nth-child(3) { animation-delay: 1.6s; font-size: 9px; right: -22px; top: -28px; }

  @keyframes floatZ {
    0%   { opacity: 0; transform: translateY(0) translateX(0); }
    20%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-18px) translateX(8px); }
  }

  /* ── Status info ── */
  .status-label {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: color 0.4s ease;
  }

  .state-idle     .status-label { color: #4caf7d; }
  .state-working  .status-label { color: #4a90d9; }
  .state-error    .status-label { color: #e05555; }
  .state-sleeping .status-label { color: #aaa; }

  .status-message {
    font-size: 0.85rem;
    color: #666;
    max-width: 280px;
    text-align: center;
    word-break: keep-all;
  }

  .status-time {
    font-size: 0.75rem;
    color: #444;
    margin-top: 4px;
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  .state-idle .status-dot { background: #4caf7d; }
  .state-working .status-dot { background: #4a90d9; }
  .state-error .status-dot { background: #e05555; }
  .state-sleeping .status-dot { background: #888; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .connection-status {
    position: fixed;
    bottom: 16px;
    font-size: 0.7rem;
    color: #333;
  }
  .connection-status.connected { color: #4caf7d; }

  .nav {
    position: fixed;
    top: 12px;
    right: 12px;
  }
  .nav a {
    color: #444;
    text-decoration: none;
    font-size: 0.75rem;
    padding: 4px 10px;
    border: 1px solid #2a2a3a;
    border-radius: 6px;
  }
  .nav a:hover { color: #7eb8ff; border-color: #7eb8ff; }
</style>
</head>
<body>

<div class="nav">
  <a href="index.html">Growth</a>
</div>

<div class="widget state-idle" id="widget">
  <div class="slime" id="slime">
    <div class="slime-body">
      <div class="face">
        <div class="eyes">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="mouth"></div>
      </div>
    </div>
    <span class="zzz">z</span>
    <span class="zzz">z</span>
    <span class="zzz">Z</span>
  </div>

  <div class="status-label" id="label"><span class="status-dot"></span>connecting...</div>
  <div class="status-message" id="message"></div>
  <div class="status-time" id="time"></div>
</div>

<div class="connection-status" id="conn-status">connecting...</div>

<!-- Firebase SDK (compat for simplicity) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  databaseURL: "https://sora-7d10c-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const STATES = {
  idle:     { cls: 'state-idle',     label: '대기중' },
  working:  { cls: 'state-working',  label: '작업중' },
  error:    { cls: 'state-error',    label: '에러!' },
  sleeping: { cls: 'state-sleeping', label: 'zzZ...' },
};

const SUBSTATES = {
  thinking:   '생각중',
  typing:     '입력중',
  searching:  '검색중',
  coding:     '코딩중',
  reading:    '읽는중',
  restarting: '재시작중',
};

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if (diff < 60) return `${Math.floor(diff)}초 전`;
  if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
  return `${Math.floor(diff/86400)}일 전`;
}

const SUB_CLASSES = Object.keys(SUBSTATES).map(k => 'sub-' + k);

function applyState(data) {
  if (!data) return;
  const widget = document.getElementById('widget');
  const label = document.getElementById('label');
  const message = document.getElementById('message');
  const time = document.getElementById('time');

  const state = data.state || 'idle';
  const substate = data.substate || '';
  const info = STATES[state] || STATES.idle;

  // Clear all state/substate classes
  Object.values(STATES).forEach(s => widget.classList.remove(s.cls));
  SUB_CLASSES.forEach(c => widget.classList.remove(c));

  widget.classList.add(info.cls);

  // Apply substate class if working + valid substate
  let displayLabel = info.label;
  if (state === 'working' && substate && SUBSTATES[substate]) {
    widget.classList.add('sub-' + substate);
    displayLabel = SUBSTATES[substate];
  }

  label.innerHTML = `<span class="status-dot"></span>${displayLabel}`;
  message.textContent = data.message || '';
  time.textContent = data.updated_at ? timeAgo(data.updated_at) : '';
}

// Real-time listener
const statusRef = db.ref('status');
statusRef.on('value', (snapshot) => {
  const data = snapshot.val();
  applyState(data);
  document.getElementById('conn-status').textContent = 'real-time connected';
  document.getElementById('conn-status').classList.add('connected');
});

// Update time-ago every 10s
setInterval(() => {
  const time = document.getElementById('time');
  if (time.dataset.updatedAt) {
    time.textContent = timeAgo(time.dataset.updatedAt);
  }
}, 10000);

// Connection state monitoring
db.ref('.info/connected').on('value', (snap) => {
  const conn = document.getElementById('conn-status');
  if (snap.val() === true) {
    conn.textContent = 'real-time connected';
    conn.classList.add('connected');
  } else {
    conn.textContent = 'reconnecting...';
    conn.classList.remove('connected');
  }
});
</script>

</body>
</html>
