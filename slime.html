<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORA & LUNA Slime</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 60px;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }

  .widget {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .bot-name {
    font-size: 16px;
    font-weight: 700;
    color: #ccc;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  /* ── Slime Body ── */
  .slime {
    width: 120px;
    height: 120px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slime-body {
    width: 100px;
    height: 90px;
    border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
    position: relative;
    transition: background 0.4s ease;
  }

  .slime-body::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 18px;
    border-radius: 0 0 50% 50%;
    background: inherit;
    transition: background 0.4s ease;
  }

  .slime-body::before {
    content: '';
    position: absolute;
    top: 14px;
    left: 18px;
    width: 22px;
    height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transform: rotate(-20deg);
  }

  /* ── Face ── */
  .face {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -44%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .eyes { display: flex; gap: 14px; }

  .eye {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #1a1a2e;
    position: relative;
    transition: all 0.3s ease;
  }

  .mouth {
    width: 18px;
    height: 8px;
    border-radius: 0 0 10px 10px;
    border-bottom: 3px solid #1a1a2e;
    border-left: 3px solid #1a1a2e;
    border-right: 3px solid #1a1a2e;
    transition: all 0.3s ease;
  }

  /* ── State: idle ── */
  .state-idle .slime-body { background: #4caf7d; }
  .state-idle .slime-body::after { background: #4caf7d; }
  .state-idle .eye { background: #1a3a2e; }
  .state-idle .mouth {
    width: 18px; height: 8px;
    border-radius: 0 0 10px 10px;
    border-bottom: 3px solid #1a3a2e;
    border-left: 3px solid #1a3a2e;
    border-right: 3px solid #1a3a2e;
    border-top: none;
  }
  .state-idle .slime { animation: bounce 2s ease-in-out infinite; }

  /* ── State: working (default = typing) ── */
  .state-working .slime-body { background: #4a90d9; }
  .state-working .slime-body::after { background: #4a90d9; }
  .state-working .eye { background: #0d2a4a; width: 8px; height: 8px; border-radius: 50%; }
  .state-working .mouth {
    width: 14px; height: 4px;
    border-radius: 2px;
    border-bottom: 3px solid #0d2a4a;
    border-left: 3px solid #0d2a4a;
    border-right: 3px solid #0d2a4a;
  }
  .state-working .slime { animation: work 0.6s ease-in-out infinite; }
  .state-working .slime-body { animation: stretch 0.6s ease-in-out infinite; }

  /* substate: thinking */
  .sub-thinking .slime-body { background: #9b6dd7 !important; }
  .sub-thinking .slime-body::after { background: #9b6dd7 !important; }
  .sub-thinking .eye { background: #2d1a4a !important; width: 6px !important; height: 6px !important; border-radius: 50% !important; transform: translateY(-6px) !important; }
  .sub-thinking .mouth {
    width: 8px !important; height: 8px !important;
    border-radius: 50% !important;
    border: 3px solid #2d1a4a !important;
    background: transparent !important;
  }
  .sub-thinking .slime { animation: think-float 2s ease-in-out infinite !important; }
  .sub-thinking .slime-body { animation: none !important; }

  /* substate: typing */
  .sub-typing .slime-body { background: #e07bbb !important; }
  .sub-typing .slime-body::after { background: #e07bbb !important; }
  .sub-typing .eye { background: #4a1a3a !important; width: 7px !important; height: 7px !important; border-radius: 50% !important; }
  .sub-typing .mouth {
    width: 4px !important; height: 4px !important;
    border-radius: 50% !important;
    border: none !important;
    background: #4a1a3a !important;
    animation: type-talk 0.4s ease-in-out infinite !important;
  }
  .sub-typing .slime { animation: work 0.8s ease-in-out infinite !important; }
  .sub-typing .slime-body { animation: none !important; }

  /* substate: searching */
  .sub-searching .slime-body { background: #e0a830 !important; }
  .sub-searching .slime-body::after { background: #e0a830 !important; }
  .sub-searching .eye { background: #4a3010 !important; width: 12px !important; height: 12px !important; border-radius: 50% !important; }
  .sub-searching .mouth {
    width: 6px !important; height: 4px !important;
    border-radius: 2px !important;
    border: none !important;
    background: #4a3010 !important;
  }
  .sub-searching .slime { animation: work 0.6s ease-in-out infinite !important; }
  .sub-searching .slime-body { animation: none !important; }
  .sub-searching .eyes { animation: look-around 0.8s ease-in-out infinite !important; }

  /* substate: coding */
  .sub-coding .slime-body { background: #2dd4bf !important; }
  .sub-coding .slime-body::after { background: #2dd4bf !important; }
  .sub-coding .eye {
    background: transparent !important;
    width: 12px !important; height: 3px !important;
    border-radius: 0 !important;
    border-bottom: 3px solid #0d3a3a !important;
    border-top: none !important;
  }
  .sub-coding .mouth {
    width: 18px !important; height: 2px !important;
    border-radius: 2px !important;
    border: none !important;
    background: #0d3a3a !important;
  }
  .sub-coding .slime { animation: code-bob 0.8s ease-in-out infinite !important; }
  .sub-coding .slime-body { animation: none !important; }

  /* substate: reading */
  .sub-reading .slime-body { background: #5bc0de !important; }
  .sub-reading .slime-body::after { background: #5bc0de !important; }
  .sub-reading .eye {
    background: #1a3a4a !important; width: 14px !important; height: 14px !important; border-radius: 50% !important;
    box-shadow: inset 3px 2px 0 rgba(255,255,255,0.5) !important;
  }
  .sub-reading .mouth {
    width: 10px !important; height: 5px !important;
    border-radius: 0 0 8px 8px !important;
    border-bottom: 3px solid #1a3a4a !important;
    border-left: 3px solid #1a3a4a !important;
    border-right: 3px solid #1a3a4a !important;
    border-top: none !important;
  }
  .sub-reading .slime { animation: read-nod 2.5s ease-in-out infinite !important; }
  .sub-reading .slime-body { animation: none !important; }

  /* substate: restarting */
  .sub-restarting .slime-body { background: #e07b30 !important; }
  .sub-restarting .slime-body::after { background: #e07b30 !important; }
  .sub-restarting .eye { background: #4a2a0d !important; width: 6px !important; height: 6px !important; border-radius: 50% !important; }
  .sub-restarting .mouth {
    width: 10px !important; height: 10px !important;
    border-radius: 50% !important;
    border: 3px solid #4a2a0d !important;
    background: transparent !important;
  }
  .sub-restarting .slime { animation: spin 1.5s linear infinite !important; }
  .sub-restarting .slime-body { animation: none !important; }

  /* ── State: error ── */
  .state-error .slime-body { background: #e05555; }
  .state-error .slime-body::after { background: #e05555; }
  .state-error .eye { background: #3a0d0d; border-radius: 50%; width: 11px; height: 11px; }
  .state-error .eye::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 5px; height: 5px;
    border-radius: 50%;
    border: 2px solid #3a0d0d;
    background: #e05555;
  }
  .state-error .mouth {
    width: 16px; height: 6px;
    border-radius: 10px 10px 0 0;
    border-top: 3px solid #3a0d0d;
    border-left: 3px solid #3a0d0d;
    border-right: 3px solid #3a0d0d;
    border-bottom: none;
  }
  .state-error .slime { animation: shake 0.3s ease-in-out infinite; }

  /* ── State: sleeping ── */
  .state-sleeping .slime-body { background: #888; }
  .state-sleeping .slime-body::after { background: #888; }
  .state-sleeping .eye {
    background: transparent;
    width: 12px; height: 4px;
    border-radius: 0;
    border-bottom: 3px solid #333;
    border-top: none;
  }
  .state-sleeping .mouth {
    width: 12px; height: 4px;
    border-radius: 2px;
    border-bottom: 3px solid #333;
    border-left: 3px solid #333;
    border-right: 3px solid #333;
  }
  .state-sleeping .slime { animation: breathe 3s ease-in-out infinite; }

  /* ── Animations ── */
  @keyframes bounce {
    0%, 100% { transform: translateY(0) scaleY(1) scaleX(1); }
    40%       { transform: translateY(-16px) scaleY(1.06) scaleX(0.96); }
    60%       { transform: translateY(-14px) scaleY(1.06) scaleX(0.96); }
    80%       { transform: translateY(2px) scaleY(0.93) scaleX(1.07); }
  }

  @keyframes work {
    0%, 100% { transform: translateY(0); }
    25%       { transform: translateY(-8px); }
    75%       { transform: translateY(2px); }
  }

  @keyframes stretch {
    0%, 100% { transform: scaleX(1) scaleY(1); }
    25%       { transform: scaleX(0.88) scaleY(1.12); }
    75%       { transform: scaleX(1.08) scaleY(0.94); }
  }

  @keyframes shake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(-5px) rotate(-2deg); }
    40%  { transform: translateX(5px) rotate(2deg); }
    60%  { transform: translateX(-4px) rotate(-1deg); }
    80%  { transform: translateX(4px) rotate(1deg); }
    100% { transform: translateX(0); }
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.07); }
  }

  @keyframes think-float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    30%       { transform: translateY(-10px) rotate(2deg); }
    70%       { transform: translateY(-8px) rotate(-2deg); }
  }

  @keyframes type-talk {
    0%, 100% { transform: scaleY(1); }
    50%       { transform: scaleY(0.4); }
  }

  @keyframes look-around {
    0%, 100% { transform: translateX(0); }
    25%       { transform: translateX(-4px); }
    75%       { transform: translateX(4px); }
  }

  @keyframes code-bob {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-5px); }
  }

  @keyframes read-nod {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%       { transform: translateY(-3px) rotate(3deg); }
    50%       { transform: translateY(2px) rotate(0deg); }
    75%       { transform: translateY(-3px) rotate(-3deg); }
  }

  @keyframes spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ── ZZZ ── */
  .zzz {
    position: absolute;
    top: -8px;
    right: -4px;
    font-size: 13px;
    color: #aaa;
    font-weight: bold;
    opacity: 0;
    animation: none;
  }

  .state-sleeping .zzz { animation: floatZ 2.4s ease-in-out infinite; }
  .state-sleeping .zzz:nth-child(2) { animation-delay: 0.8s; font-size: 10px; right: -12px; top: -16px; }
  .state-sleeping .zzz:nth-child(3) { animation-delay: 1.6s; font-size: 8px; right: -18px; top: -22px; }

  @keyframes floatZ {
    0%   { opacity: 0; transform: translateY(0) translateX(0); }
    20%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-18px) translateX(8px); }
  }

  /* ── Status label ── */
  .status-label {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: color 0.4s ease;
  }

  .state-idle     .status-label { color: #4caf7d; }
  .state-working  .status-label { color: #4a90d9; }
  .state-error    .status-label { color: #e05555; }
  .state-sleeping .status-label { color: #aaa; }
  .sub-thinking   .status-label { color: #9b6dd7 !important; }
  .sub-typing     .status-label { color: #e07bbb !important; }
  .sub-searching  .status-label { color: #e0a830 !important; }
  .sub-coding     .status-label { color: #2dd4bf !important; }
  .sub-reading    .status-label { color: #5bc0de !important; }
  .sub-restarting .status-label { color: #e07b30 !important; }

  /* ── Connection indicator ── */
  .connection {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.3px;
  }
  .connection.live { color: #4caf7d; }

  /* ── Control buttons ── */
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .ctrl-btn {
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    color: #aaa;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }
  .ctrl-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #ddd;
    border-color: rgba(255,255,255,0.25);
  }
  .ctrl-btn:active { transform: scale(0.95); }

  /* ── Last update time ── */
  .last-update {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    letter-spacing: 0.3px;
    transition: color 0.4s ease;
  }
  .last-update.stale { color: #e05555; }
  .last-update.recent { color: #4caf7d; }
  .ctrl-btn.sent {
    background: rgba(76,175,125,0.2);
    border-color: rgba(76,175,125,0.4);
    color: #4caf7d;
    pointer-events: none;
  }
  .ctrl-btn.error {
    background: rgba(224,85,85,0.2);
    border-color: rgba(224,85,85,0.4);
    color: #e05555;
  }

  /* ── Mobile responsive ── */
  @media (max-width: 480px) {
    body {
      flex-direction: column;
      gap: 40px;
      padding: 30px 0;
    }
    .bot-name { font-size: 14px; }
    .slime { width: 100px; height: 100px; }
    .slime-body { width: 80px; height: 72px; }
    .status-label { font-size: 12px; }
    .ctrl-btn { font-size: 10px; padding: 5px 10px; }
  }
</style>
</head>
<body>

<div class="connection" id="conn">connecting...</div>

<!-- SORA (left) -->
<div class="widget state-idle" id="sora-widget">
  <div class="bot-name">SORA</div>
  <div class="slime">
    <div class="slime-body">
      <div class="face">
        <div class="eyes">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="mouth"></div>
      </div>
    </div>
    <span class="zzz">z</span>
    <span class="zzz">z</span>
    <span class="zzz">Z</span>
  </div>
  <div class="status-label" id="sora-label">connecting...</div>
  <div class="last-update" id="sora-update">—</div>
  <div class="controls">
    <button class="ctrl-btn" onclick="sendCommand('restart', this, 'sora')">재시작</button>
    <button class="ctrl-btn" onclick="sendCommand('repair', this, 'sora')">자가수리</button>
  </div>
</div>

<!-- LUNA (right) -->
<div class="widget state-idle" id="luna-widget">
  <div class="bot-name">LUNA</div>
  <div class="slime">
    <div class="slime-body">
      <div class="face">
        <div class="eyes">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="mouth"></div>
      </div>
    </div>
    <span class="zzz">z</span>
    <span class="zzz">z</span>
    <span class="zzz">Z</span>
  </div>
  <div class="status-label" id="luna-label">connecting...</div>
  <div class="last-update" id="luna-update">—</div>
  <div class="controls">
    <button class="ctrl-btn" onclick="sendCommand('restart', this, 'luna')">재시작</button>
    <button class="ctrl-btn" onclick="sendCommand('repair', this, 'luna')">자가수리</button>
  </div>
</div>

<script>
  const FIREBASE_BASE = 'https://sora-7d10c-default-rtdb.asia-southeast1.firebasedatabase.app';
  const SORA_STATUS_URL = FIREBASE_BASE + '/sora/status.json';
  const LUNA_STATUS_URL = FIREBASE_BASE + '/luna/status.json';

  const STATES = {
    idle:     { cls: 'state-idle',     label: '대기중' },
    working:  { cls: 'state-working',  label: '작업 중...' },
    error:    { cls: 'state-error',    label: '에러 발생!' },
    sleeping: { cls: 'state-sleeping', label: 'zzZ...' },
  };

  const SUBSTATES = ['thinking', 'typing', 'searching', 'coding', 'reading', 'restarting'];
  const SUBSTATE_LABELS = {
    thinking: '생각 중...',
    typing: '입력 중...',
    searching: '검색 중...',
    coding: '코딩 중...',
    reading: '읽는 중...',
    restarting: '재시작 중...',
  };

  // English → Korean message mapping
  const MSG_KO = {
    'processing message': '메시지 처리 중...',
    'generating response': '응답 생성 중...',
    'reading file': '파일 읽는 중...',
    'searching': '검색 중...',
    'thinking': '생각 중...',
    'typing': '입력 중...',
    'coding': '코딩 중...',
    'reading': '읽는 중...',
    'restarting': '재시작 중...',
    'idle': '대기중',
    'error': '에러 발생!',
    'sleeping': 'zzZ...',
    'heartbeat check': '상태 점검 중...',
    'growth check': '성장 점검 중...',
    'curator run': '큐레이터 실행 중...',
    'thinking time': '사색 시간...',
  };

  function translateMessage(msg) {
    if (!msg) return null;
    const lower = msg.toLowerCase().trim();
    if (MSG_KO[lower]) return MSG_KO[lower];
    // Check partial matches
    for (const [en, ko] of Object.entries(MSG_KO)) {
      if (lower.includes(en)) return ko;
    }
    return msg; // Return original if no mapping found
  }

  function formatTimeAgo(isoString) {
    if (!isoString) return '—';
    const updated = new Date(isoString);
    const now = new Date();
    const diffSec = Math.floor((now - updated) / 1000);
    if (diffSec < 0) return '방금';
    if (diffSec < 60) return `${diffSec}초 전`;
    const diffMin = Math.floor(diffSec / 60);
    if (diffMin < 60) return `${diffMin}분 전`;
    const diffHr = Math.floor(diffMin / 60);
    if (diffHr < 24) return `${diffHr}시간 전`;
    return `${Math.floor(diffHr / 24)}일 전`;
  }

  function updateTimeDisplay(elementId, isoString) {
    const el = document.getElementById(elementId);
    if (!el) return;
    el.textContent = formatTimeAgo(isoString);
    if (!isoString) { el.className = 'last-update'; return; }
    const diffSec = Math.floor((new Date() - new Date(isoString)) / 1000);
    el.className = 'last-update ' + (diffSec > 300 ? 'stale' : 'recent');
  }

  function setWidgetState(widgetId, labelId, name, message, substate) {
    if (!STATES[name]) name = 'idle';

    const widget = document.getElementById(widgetId);
    const label  = document.getElementById(labelId);

    Object.values(STATES).forEach(s => widget.classList.remove(s.cls));
    SUBSTATES.forEach(s => widget.classList.remove('sub-' + s));

    widget.classList.add(STATES[name].cls);

    const translatedMsg = translateMessage(message);

    if (name === 'working' && substate && SUBSTATES.includes(substate)) {
      widget.classList.add('sub-' + substate);
      label.textContent = translatedMsg || SUBSTATE_LABELS[substate] || STATES[name].label;
    } else {
      label.textContent = translatedMsg || STATES[name].label;
    }
  }

  // Poll Firebase for both bots
  async function pollBoth() {
    const conn = document.getElementById('conn');
    let anyLive = false;

    try {
      const [soraRes, lunaRes] = await Promise.all([
        fetch(SORA_STATUS_URL).then(r => r.json()).catch(() => null),
        fetch(LUNA_STATUS_URL).then(r => r.json()).catch(() => null),
      ]);

      if (soraRes) {
        setWidgetState('sora-widget', 'sora-label', soraRes.state, soraRes.message, soraRes.substate);
        updateTimeDisplay('sora-update', soraRes.updated_at);
        anyLive = true;
      }
      if (lunaRes) {
        setWidgetState('luna-widget', 'luna-label', lunaRes.state, lunaRes.message, lunaRes.substate);
        updateTimeDisplay('luna-update', lunaRes.updated_at);
        anyLive = true;
      }

      conn.textContent = anyLive ? 'live' : 'offline';
      conn.classList.toggle('live', anyLive);
    } catch (e) {
      conn.textContent = 'offline';
      conn.classList.remove('live');
    }
  }

  async function sendCommand(action, btn, bot) {
    const cmdPath = bot === 'luna' ? '/luna/commands.json' : '/sora/commands.json';
    const cmdUrl = FIREBASE_BASE + cmdPath;
    const orig = btn.textContent;
    btn.textContent = '전송 중...';
    btn.classList.remove('error');
    try {
      await fetch(cmdUrl, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: action,
          requested_at: new Date().toISOString()
        })
      });
      btn.textContent = '전송 완료';
      btn.classList.add('sent');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('sent'); btn.style.pointerEvents = ''; }, 60000);
    } catch (e) {
      btn.textContent = '실패';
      btn.classList.add('error');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('error'); }, 3000);
    }
  }

  pollBoth();
  setInterval(pollBoth, 3000);
</script>
